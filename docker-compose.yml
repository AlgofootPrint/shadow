version: "3.8"

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: anvil
    command:
      - "--host=0.0.0.0"
      - "--chain-id=31337"
      - "--block-time=1"
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 5s
      retries: 10

  sandbox:
    image: aztecprotocol/aztec-sandbox:0.20.0
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      ETHEREUM_HOST: http://anvil:8545
      CHAIN_ID: "31337"
    ports:
      - "8080:8080"
